# golangci-lint configuration for Datadatdat-client-go
# Configuration compatible with golangci-lint v2.5.0
version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - misspell
    - gocyclo
    - goconst
    - whitespace
  exclusions:
    # Skip files carrying the `// Code generated ... DO NOT EDIT.` marker.
    # Every file emitted by ./generate (after the v7.22.0 upgrade) has this
    # marker, so api_*.go / model_*.go / client.go / configuration.go /
    # response.go / utils.go are all auto-excluded.
    generated: strict
    rules:
      # goconst flags every repeated literal in our hand-written *_test.go
      # files ("test", "value", "host", "port", "localhost", etc.). These
      # are test fixture values; inlining them keeps tests readable. Skip
      # goconst on test files.
      - path: _test\.go$
        linters:
          - goconst
  settings:
    gosec:
      excludes:
        # Auto-generated OpenAPI client code - these are false positives
        - G117 # BasicAuth.Password struct field matches secret pattern
        - G704 # SSRF on HTTPClient.Do() - intentional purpose of an HTTP client
        - G706 # Log injection in debug dump output - only when cfg.Debug is true
