# golangci-lint configuration for Datadatdat-client-go
# Configuration compatible with golangci-lint v2.5.0
version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - misspell
    - gocyclo
    - goconst
    - whitespace
  settings:
    gosec:
      excludes:
        # G117: false positive on BasicAuth.Password struct field in auto-generated OpenAPI client code
        - G117
        # G704: SSRF false positive - HTTPClient.Do() call in auto-generated client is intentional
        - G704
        # G706: log injection false positives - debug logging of HTTP request/response dumps
        #       in auto-generated OpenAPI client code
        - G706