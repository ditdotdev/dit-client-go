#
# Pull Request 2 - Comprehensive CI/CD Pipeline with Best Practices
# This workflow includes enhanced testing, security scanning, and quality checks
#
name: Pull Request 2

permissions:
  contents: read
  issues: write
  pull-requests: write

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [ master, main ]
  workflow_dispatch:
    inputs:
      debug_enabled:
        type: boolean
        description: 'Enable debug logging'
        required: false
        default: false

env:
  GO_VERSION: '1.26.2'
  GOPRIVATE: github.com/ditdotdev/*
  GONOPROXY: github.com/ditdotdev/*
  GONOSUMDB: github.com/ditdotdev/*
  GOPROXY: https://proxy.golang.org,direct
  GIT_TERMINAL_PROMPT: 0

jobs:
  # Security and dependency scanning
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Configure Git for private modules
        run: |
          git config --global url."https://x-access-token:${{ secrets.GO_MODULES_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.GO_MODULES_TOKEN }}@github.com" > ~/.git-credentials

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Run Go security scanner (gosec)
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          # Rules suppressed at the workflow level. Every emitted file carries the standard
          # // Code generated ... DO NOT EDIT. marker (since the openapi-generator v7.22.0
          # upgrade in #29), so any in-source // #nosec comments would be lost on the next
          # ./generate run. Workflow-level exclusion is the durable place.
          #
          # G104: Body.Close() error unchecked — convention in generated openapi clients;
          #       the body has already been drained by io.ReadAll above the Close() call.
          # G117: "Password" struct field — generated from OpenAPI spec, not hardcoded.
          # G304: addFile helper opens a caller-supplied path for multipart upload.
          #       The whole purpose of the helper is to expose a file-upload entry point;
          #       constraining the path here would defeat the API surface.
          # G704: HTTP request from configured URL — the base behavior of any HTTP client.
          # G706: log.Printf of dump — generated debug logging, never user-facing.
          gosec -exclude=G104,G117,G304,G704,G706 -fmt=json -out=gosec-results.json ./...
          gosec -exclude=G104,G117,G304,G704,G706 ./...

      - name: Run Go vulnerability scanner (govulncheck)
        run: |
          # Use Go's official vulnerability scanner instead of Nancy
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./... || echo "Vulnerability scan completed with findings"
        continue-on-error: true

  # Code quality and linting
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Configure Git for private modules
        run: |
          git config --global url."https://x-access-token:${{ secrets.GO_MODULES_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.GO_MODULES_TOKEN }}@github.com" > ~/.git-credentials

      - name: Download dependencies
        run: go mod download

      - name: Run gofmt
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "The following files are not formatted:"
            gofmt -s -l .
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      # staticcheck is bundled into golangci-lint below; running it standalone
      # is redundant AND less configurable — it has no way to honor the
      # `// Code generated ... DO NOT EDIT.` markers on the auto-generated
       # files in this repo, so it would trip on stylistic patterns in stock
      # upstream openapi-generator templates. .golangci.yml configures the
      # `staticcheck` linter to skip generated files via
      # `linters.exclusions.generated: strict`, which is what we actually want.
      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m

  # Build and test across multiple versions
  build-test:
    name: Build and Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ github.event_name == 'pull_request' && fromJSON('["ubuntu-latest"]') || fromJSON('["ubuntu-latest", "windows-latest", "macos-latest"]') }}
        go-version: ['1.26']
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go ${{ matrix.go-version }}
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Configure Git for private modules (Unix)
        if: runner.os != 'Windows'
        run: |
          git config --global url."https://x-access-token:${{ secrets.GO_MODULES_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.GO_MODULES_TOKEN }}@github.com" > ~/.git-credentials

      - name: Configure Git for private modules (Windows)
        if: runner.os == 'Windows'
        run: |
          git config --global url."https://x-access-token:${{ secrets.GO_MODULES_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.GO_MODULES_TOKEN }}@github.com" | Out-File -FilePath "$env:USERPROFILE\.git-credentials" -Encoding UTF8
        shell: pwsh

      - name: Configure Go environment
        run: |
          go env -w GOPRIVATE=github.com/ditdotdev/*
          go env -w GONOPROXY=github.com/ditdotdev/*
          go env -w GONOSUMDB=github.com/ditdotdev/*
          go env -w GOPROXY=https://proxy.golang.org,direct

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build -v ./...

      - name: Run tests
        run: |
          if [ "${{ runner.os }}" != "Windows" ]; then
            export CGO_ENABLED=1
            go test -v -race -coverprofile=coverage.out ./...
          else
            go test -v -coverprofile=coverage.out ./...
          fi
        shell: bash

      - name: Generate coverage report
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == '1.26'
        run: go tool cover -html=coverage.out -o coverage.html

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == '1.26'
        uses: codecov/codecov-action@v7
        with:
          file: ./coverage.out
          flags: unittests
          name: codecov-umbrella
        continue-on-error: true

      - name: Upload coverage artifact
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == '1.26'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.html

  # Integration tests (if they exist)
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    needs: [build-test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Configure Git for private modules
        run: |
          git config --global url."https://x-access-token:${{ secrets.GO_MODULES_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.GO_MODULES_TOKEN }}@github.com" > ~/.git-credentials

      - name: Download dependencies
        run: go mod download

      - name: Run integration tests
        run: |
          if [ -d "integration" ] || grep -r "integration" . --include="*.go" | grep -q "build.*integration"; then
            echo "Running integration tests..."
            go test -v -tags=integration ./...
          else
            echo "No integration tests found, skipping..."
          fi
        shell: bash

  # Performance benchmarks
  benchmark:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    needs: [build-test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Configure Git for private modules
        run: |
          git config --global url."https://x-access-token:${{ secrets.GO_MODULES_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.GO_MODULES_TOKEN }}@github.com" > ~/.git-credentials

      - name: Download dependencies
        run: go mod download

      - name: Run benchmarks
        run: |
          if go test -list . | grep -q "Benchmark"; then
            echo "Running benchmarks..."
            go test -v -bench=. -benchmem ./... | tee benchmark.txt
            echo "BENCHMARKS_FOUND=true" >> $GITHUB_ENV
          else
            echo "No benchmarks found, skipping..."
            echo "BENCHMARKS_FOUND=false" >> $GITHUB_ENV
          fi
        shell: bash

      - name: Upload benchmark results
        if: success() && env.BENCHMARKS_FOUND == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results
          path: benchmark.txt
        continue-on-error: true

