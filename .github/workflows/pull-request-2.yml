#
# Pull Request 2 - Comprehensive CI/CD Pipeline with Best Practices
# This workflow includes enhanced testing, security scanning, and quality checks
#
name: Pull Request 2

permissions:
  contents: read
  issues: write
  pull-requests: write

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [ master, main ]
  workflow_dispatch:
    inputs:
      debug_enabled:
        type: boolean
        description: 'Enable debug logging'
        required: false
        default: false

env:
  GO_VERSION: '1.25.1'
  GOPRIVATE: github.com/datadatdat/*
  GONOPROXY: github.com/datadatdat/*
  GONOSUMDB: github.com/datadatdat/*
  GOPROXY: https://proxy.golang.org,direct
  GIT_TERMINAL_PROMPT: 0

jobs:
  # Security and dependency scanning
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Configure Git for private modules
        run: |
          git config --global url."https://x-access-token:${{ secrets.GO_MODULES_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.GO_MODULES_TOKEN }}@github.com" > ~/.git-credentials

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Run Go security scanner (gosec)
        run: |
          # Use latest gosec for best security coverage
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          # Run gosec with JSON output for better CI integration
          gosec -fmt=json -out=gosec-results.json ./... || true
          # Also run with text output for human-readable results
          gosec ./... || echo "Gosec completed with findings"
        continue-on-error: true

      - name: Run Go vulnerability scanner (govulncheck)
        run: |
          # Use Go's official vulnerability scanner instead of Nancy
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./... || echo "Vulnerability scan completed with findings"
        continue-on-error: true

  # Code quality and linting
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Configure Git for private modules
        run: |
          git config --global url."https://x-access-token:${{ secrets.GO_MODULES_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.GO_MODULES_TOKEN }}@github.com" > ~/.git-credentials

      - name: Download dependencies
        run: go mod download

      - name: Run gofmt
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "The following files are not formatted:"
            gofmt -s -l .
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run staticcheck
        run: staticcheck -checks="inherit,-SA1019" ./...

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m

  # Build and test across multiple versions
  build-test:
    name: Build and Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        go-version: ['1.25']
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go ${{ matrix.go-version }}
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Configure Git for private modules (Unix)
        if: runner.os != 'Windows'
        run: |
          git config --global url."https://x-access-token:${{ secrets.GO_MODULES_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.GO_MODULES_TOKEN }}@github.com" > ~/.git-credentials

      - name: Configure Git for private modules (Windows)
        if: runner.os == 'Windows'
        run: |
          git config --global url."https://x-access-token:${{ secrets.GO_MODULES_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.GO_MODULES_TOKEN }}@github.com" | Out-File -FilePath "$env:USERPROFILE\.git-credentials" -Encoding UTF8
        shell: pwsh

      - name: Configure Go environment
        run: |
          go env -w GOPRIVATE=github.com/datadatdat/*
          go env -w GONOPROXY=github.com/datadatdat/*
          go env -w GONOSUMDB=github.com/datadatdat/*
          go env -w GOPROXY=direct

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build -v ./...

      - name: Run tests
        run: |
          if [ "${{ runner.os }}" != "Windows" ]; then
            export CGO_ENABLED=1
            go test -v -race -coverprofile=coverage.out ./...
          else
            go test -v -coverprofile=coverage.out ./...
          fi
        shell: bash

      - name: Generate coverage report
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == '1.25'
        run: go tool cover -html=coverage.out -o coverage.html

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == '1.25'
        uses: codecov/codecov-action@v5
        with:
          file: ./coverage.out
          flags: unittests
          name: codecov-umbrella
        continue-on-error: true

      - name: Upload coverage artifact
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == '1.25'
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: coverage.html

  # Integration tests (if they exist)
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    needs: [build-test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Configure Git for private modules
        run: |
          git config --global url."https://x-access-token:${{ secrets.GO_MODULES_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.GO_MODULES_TOKEN }}@github.com" > ~/.git-credentials

      - name: Download dependencies
        run: go mod download

      - name: Run integration tests
        run: |
          if [ -d "integration" ] || grep -r "integration" . --include="*.go" | grep -q "build.*integration"; then
            echo "Running integration tests..."
            go test -v -tags=integration ./...
          else
            echo "No integration tests found, skipping..."
          fi
        shell: bash

  # Performance benchmarks
  benchmark:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    needs: [build-test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Configure Git for private modules
        run: |
          git config --global url."https://x-access-token:${{ secrets.GO_MODULES_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.GO_MODULES_TOKEN }}@github.com" > ~/.git-credentials

      - name: Download dependencies
        run: go mod download

      - name: Run benchmarks
        run: |
          if go test -list . | grep -q "Benchmark"; then
            echo "Running benchmarks..."
            go test -v -bench=. -benchmem ./... | tee benchmark.txt
            echo "BENCHMARKS_FOUND=true" >> $GITHUB_ENV
          else
            echo "No benchmarks found, skipping..."
            echo "BENCHMARKS_FOUND=false" >> $GITHUB_ENV
          fi
        shell: bash

      - name: Upload benchmark results
        if: success() && env.BENCHMARKS_FOUND == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: benchmark-results
          path: benchmark.txt
        continue-on-error: true

